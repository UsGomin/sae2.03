<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" type="text/css">
    <title>Sae</title>
</head>
<body>
    <header>
        <h1>SAE 2.03</h1>
        <div class="login-wrapper">
            <button id="button-connexion">Se connecter</button>
            <button id="button-creer">Creer un compte</button>
        </div>
        <div class="connexion" hidden>
            <form class="connexion-content">
                <button id="button-close">X</button>
                <div class="title">Welcome,<br><span>sign in to continue</span></div>
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <br>
                <button>Se connecter</button>
            </form>
        </div>
        <div class="creercompte" hidden>
            <form class="creercompte-content">
                <button id="button-close">X</button>
                <div class="title">Welcome,<br><span>sign up to start</span></div>
                <input type="text" placeholder="Nom">
                <input type="text" placeholder="Prénom">
                <input type="email" placeholder="Email">
                <input type="password" placeholder="Password">
                <button>Créer son compte</button>
            </form>
        </div>
        <dialog id="login-modal">
            <div id="login-content">
            </div>
        </dialog>
    </header>
    <main>

    </main>
    <script src="script.js"></script>
</body>
</html>
