<VirtualHost *:80>
	ServerName SAE
	DocumentRoot /var/www/sae203

	<Directory "/var/www/sae203">
		AllowOverride None
		Require all granted
	</Directory>
	
	<FilesMatch ".+\.(html|htm)$">
		SetHandler application/x-httpd-php
	</FilesMatch>
	<FilesMatch "^[^.]+$">
		SetHandler application/x-httpd-php
	</FilesMatch>
	
	ErrorLog ${APACHE_LOG_DIR}/error.log
	CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
